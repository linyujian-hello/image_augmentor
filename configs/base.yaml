# configs/base.yaml
output_size: [224, 224]
pipeline:
  - name: random_flip
    params:
      p: 0.5
      horizontal: true
  - name: random_crop_resize
    params:
      p: 0.5
      scale_min: 0.85
      scale_max: 1.0
  - name: hsv_adjust
    params:
      p: 0.8
      hue_delta: 20
      sat_min: 0.7
      sat_max: 1.3
      val_min: 0.8
      val_max: 1.2
  - name: gaussian_noise
    params:
      p: 0.2
      var: 0.02